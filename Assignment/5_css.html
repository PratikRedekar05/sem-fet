<!DOCTYPE html>
<html>
<head>
    <title>Skills Matrix</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: skyblue;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        ol {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 20px;
        }

        .box {
            background: white;
            padding: 15px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
        }

        .box-title {
            font-weight: bold;
            font-size: 18px;
            color: #0077b6;
            margin-bottom: 10px;
        }

        ul {
            list-style-type: square;
            text-align: left;
            padding-left: 20px;
        }

        ul li {
            margin: 5px 0;
        }
    </style>

</head>
<body>

<h1>My Skills Matrix</h1>

<ol>
    <li>
        <div class="box">
            <div class="box-title">Programming Language</div>
            <ul>
                <li>C</li>
                <li>C++</li>
                <li>Java</li>
            </ul>
        </div>
    </li>

    <li>
        <div class="box">
            <div class="box-title">Web Development</div>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
        </div>
    </li>

    <li>
        <div class="box">
            <div class="box-title">Tools and Technologies</div>
            <ul>
                <li>Git</li>
                <li>GitHub</li>
                <li>VS Code</li>
            </ul>
        </div>
    </li>

    <li>
        <div class="box">
            <div class="box-title">Core Concepts</div>
            <ul>
                <li>Data Structures</li>
                <li>Algorithms</li>
                <li>OOP Concepts</li>
            </ul>
        </div>
    </li>
</ol>

</body>
</html>
